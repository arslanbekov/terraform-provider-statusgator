# Type labels
- name: bug
  color: d73a4a
  description: Something isn't working

- name: enhancement
  color: a2eeef
  description: New feature or request

- name: feature
  color: 0e8a16
  description: New feature implementation

- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation

- name: breaking-change
  color: b60205
  description: Breaking change that requires major version bump

- name: dependencies
  color: 0366d6
  description: Pull requests that update a dependency file

- name: chore
  color: fef2c0
  description: Maintenance tasks

- name: refactor
  color: d4c5f9
  description: Code refactoring without functional changes

- name: ci
  color: fbca04
  description: CI/CD related changes

- name: fix
  color: d73a4a
  description: Bug fix

# Component labels
- name: provider
  color: 5319e7
  description: Provider configuration changes

- name: resources
  color: 1d76db
  description: Resource implementation changes

- name: data-sources
  color: 006b75
  description: Data source implementation changes

- name: tests
  color: bfd4f2
  description: Test related changes

# Status labels
- name: stale
  color: ffffff
  description: Issue/PR has not had recent activity

- name: pinned
  color: 006b75
  description: Issue is pinned and won't be auto-closed

- name: security
  color: d73a4a
  description: Security related issue

- name: help wanted
  color: 008672
  description: Extra attention is needed

- name: good first issue
  color: 7057ff
  description: Good for newcomers

- name: needs-triage
  color: ededed
  description: Needs maintainer review

- name: duplicate
  color: cfd3d7
  description: This issue or pull request already exists

- name: wontfix
  color: ffffff
  description: This will not be worked on

- name: invalid
  color: e4e669
  description: This doesn't seem right
